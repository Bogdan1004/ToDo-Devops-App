version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: localtest123
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: tododb
      DB_USER: todouser
      DB_PASSWORD: localtest123
    ports:
      - "8000:8000"
    depends_on:
      - db
