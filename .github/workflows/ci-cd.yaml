name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:${TAG} .
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:${TAG}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:latest
          echo "Pushed image with tag: ${TAG}"

  update-infra:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: Bogdan1004/ToDo-Devops-Infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: todo-infra

      - name: Update image tag
        run: |
          TAG=${{ needs.build-and-push.outputs.image-tag }}
          cd todo-infra
          sed -i "s/tag: .*/tag: \"${TAG}\"/" helm/todo-app/values.yaml
          echo "Updated tag to: ${TAG}"
          grep "tag:" helm/todo-app/values.yaml

      - name: Commit and push
        run: |
          cd todo-infra
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add helm/todo-app/values.yaml
          git diff --staged --quiet || git commit -m "ci: update image tag to ${{ needs.build-and-push.outputs.image-tag }} [skip ci]"
          git push
