name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/todo-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-infra:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: USERNAME/todo-infra   # !! Schimba USERNAME !!
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: todo-infra

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag in values.yaml
        run: |
          IMAGE_TAG=${{ needs.build-and-push.outputs.image-tag }}
          cd todo-infra
          yq e ".image.tag = \"${IMAGE_TAG}\"" -i helm/todo-app/values.yaml
          echo "Updated image tag to: ${IMAGE_TAG}"
          cat helm/todo-app/values.yaml | grep "tag:"

      - name: Commit and push changes
        run: |
          cd todo-infra
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add helm/todo-app/values.yaml
          git diff --staged --quiet || \
            git commit -m "ci: update image tag to ${{ needs.build-and-push.outputs.image-tag }} [skip ci]"
          git push